name: Update FRED Data

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 9am ET, weekdays (markets open, most data drops 8:30am ET)
  workflow_dispatch:           # also allows manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pyarrow

      - name: Pull FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fred_pull.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update FRED data $(date -u +%Y-%m-%d)"
          git push
